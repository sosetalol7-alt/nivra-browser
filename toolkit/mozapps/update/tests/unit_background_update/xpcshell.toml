[DEFAULT]
run-if = [
  "os != 'android'",
]
firefox-appdir = "browser"
skip-if = [
  "os == 'linux' && os_version == '24.04' && arch == 'x86_64' && display == 'x11'", # build with MOZ_UPDATE_AGENT_BOOL=false
  "os == 'win' && msix", # Our updater is disabled in MSIX builds
]
head = "head.js"
support-files = [
  "../data/shared.js",
  "../data/sharedUpdateXML.js",
  "../data/xpcshellUtilsAUS.js",
]

["test_backgroundupdate_actions.js"]

["test_backgroundupdate_exitcodes.js"]
run-sequentially = ["true"] # perma-fail in parallel
skip-if = [
  "os == 'win' && arch == 'x86_64' && opt", # Bug 1760099 - perma-fail with the profiler enabled by default
]

["test_backgroundupdate_glean.js"]

["test_backgroundupdate_reason.js"]

["test_backgroundupdate_reason_schedule.js"]

["test_backgroundupdate_reason_update.js"]
