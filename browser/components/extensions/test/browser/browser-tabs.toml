support-files = ["file_slowed_document.sjs"]

["browser_ext_tabs_events.js"]
support-files = [
  "context.html",
  "context_frame.html",
  "ctxmenu-image.png",
]
skip-if = [
  "os == 'win' && os_version == '11.26100' && arch == 'x86' && debug", # Bug 1786601
