[DEFAULT]
skip-if = [
	"debug && standalone", # TODO bug 2048260: Drop skip-if = standalone
]
tags = "webextensions"
prefs = [
  # We don't want to reset this at the end of the test, so that we don't have
  # to spawn a new extension child process for each test unit.
  "dom.ipc.keepProcessesAlive.extension=1",
]
support-files = [
  "head.js",
  "searchSuggestionEngine.xml",
  "searchSuggestionEngine.sjs",
]

["browser_ExtensionControlledPopup.js"]

["browser_browserSetting_vertical_tabs.js"]

["browser_ext_chrome_settings_overrides_home.js"]

["browser_ext_omnibox.js"]

["browser_ext_omnibox_activeTab.js"]

["browser_ext_optionsPage_activity.js"]

["browser_ext_optionsPage_browser_style.js"]

["browser_ext_optionsPage_links_open_in_tabs.js"]

["browser_ext_optionsPage_modals.js"]

["browser_ext_optionsPage_popups.js"]

["browser_ext_optionsPage_privileges.js"]
https_first_disabled = true

["browser_ext_runtime_openOptionsPage.js"]

["browser_ext_runtime_openOptionsPage_containers.js"]

["browser_ext_runtime_openOptionsPage_uninstall.js"]

["browser_ext_search.js"]

["browser_ext_search_favicon.js"]

["browser_ext_search_query.js"]

["browser_ext_settings_overrides_default_search.js"]

["browser_ext_url_overrides_newtab.js"]
skip-if = [
  "os == 'linux' && os_version == '24.04' && arch == 'x86_64' && display == 'x11'", # Bug 1651261
  "os == 'mac' && os_version == '14.70' && arch == 'x86_64'", # Bug 1869793
  "os == 'win' && os_version == '11.26100' && arch == 'x86' && debug", # Bug 1797751
  "os == 'win' && os_version == '11.26100' && arch == 'x86_64' && !opt", # Bug 1797751
  "os == 'win' && os_version == '11.26200' && arch == 'x86' && debug", # Bug 1797751
  "os == 'win' && os_version == '11.26200' && arch == 'x86_64' && !opt", # Bug 1797751
]
