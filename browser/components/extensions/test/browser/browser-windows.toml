[DEFAULT]
skip-if = [
	"debug && standalone", # TODO bug 2048260: Drop skip-if = standalone
]
tags = "webextensions"
prefs = [
  # We don't want to reset this at the end of the test, so that we don't have
  # to spawn a new extension child process for each test unit.
  "dom.ipc.keepProcessesAlive.extension=1",
]
support-files = [
  "head.js",
  "file_dummy.html",
  "file_iframe_document.html",
]

["browser_ext_currentWindow.js"]

["browser_ext_windows.js"]
https_first_disabled = true
support-files = ["file_title.html"]

["browser_ext_windows_allowScriptsToClose.js"]
https_first_disabled = true

["browser_ext_windows_create.js"]
tags = "fullscreen"

["browser_ext_windows_create_cookieStoreId.js"]

["browser_ext_windows_create_hidpi.js"]

["browser_ext_windows_create_params.js"]
skip-if = [
  "os == 'win' && os_version == '11.26200' && asan", # Bug 2019745
]

["browser_ext_windows_create_tabId.js"]
https_first_disabled = true

["browser_ext_windows_create_url.js"]

["browser_ext_windows_events.js"]
skip-if = [
  "os == 'win' && os_version == '11.26200' && asan", # Bug 2019745
]

["browser_ext_windows_incognito.js"]

["browser_ext_windows_remove.js"]

["browser_ext_windows_size.js"]
skip-if = [
  "os == 'mac' && os_version == '10.15' && arch == 'x86_64'",
  "os == 'mac' && os_version == '14.70' && arch == 'x86_64'", # Bug 1869793
  "os == 'mac' && os_version == '15.30' && arch == 'aarch64'",
]

["browser_ext_windows_update.js"]
tags = "fullscreen"
skip-if = [
  "os == 'linux' && os_version == '24.04' && arch == 'x86_64' && display == 'x11'", # Bug 1533982
  "os == 'mac' && os_version == '10.15' && arch == 'x86_64' && debug", # Bug 1780998
  "os == 'mac' && os_version == '14.70' && arch == 'x86_64'", # Bug 1869793
  "os == 'win' && opt && standalone", # Bug 2028652
]
