  expected:
    if (processor == "aarch64") and not debug: TIMEOUT
  [generateKeyFrame throws NotFoundError for unknown rid]
    expected:
      if (processor == "aarch64") and debug: [FAIL, PASS]
      if (processor == "aarch64") and not debug: [TIMEOUT, PASS, FAIL]

  [generateKeyFrame() throws for audio]
    expected:
      if processor == "aarch64": [FAIL, PASS]

