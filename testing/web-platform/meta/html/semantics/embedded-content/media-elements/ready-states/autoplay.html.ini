[autoplay.html]
  disabled:
    if debug and (os == "linux") and (processor == "x86"): https://bugzilla.mozilla.org/show_bug.cgi?id=1482405
  expected:
    if (os == "android") and not debug: [TIMEOUT, OK, ERROR]
  [audio.autoplay]
    expected: FAIL

  [audio.autoplay and load()]
    expected:
      if (os == "android") and not debug: [FAIL, TIMEOUT]
      FAIL

  [video.autoplay]
    expected:
      if (os == "android") and not debug: [TIMEOUT, FAIL]
      [FAIL, TIMEOUT]

  [video.autoplay and load()]
    expected:
      if (os == "android") and not debug: [TIMEOUT, FAIL]
      [FAIL, TIMEOUT]

  [video.autoplay and play()]
    expected:
      if (os == "android") and not debug: [TIMEOUT, PASS]
      [PASS, TIMEOUT]

  [video.autoplay and pause()]
    expected:
      if (os == "android") and not debug: [TIMEOUT, PASS]
      [PASS, TIMEOUT]

  [video.autoplay and internal pause steps]
    expected:
      if (os == "android") and not debug: [TIMEOUT, PASS]
